<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspección Autoelevador – Capital Box</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #f5a800;
    --red: #e22028;
    --dark: #111111;
    --border: #d0d0d0;
    --ok: #2a7d4f;
    --nok: #c0392b;
    --nc: #5a6472;
    --ok-bg: #eaf7ef;
    --nok-bg: #fdecea;
    --nc-bg: #f0f2f4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #e8e8e8;
    color: var(--dark);
    min-height: 100vh;
    padding: 32px 16px 64px;
  }

  .container { max-width: 820px; margin: 0 auto; }

  /* HEADER */
  .header {
    background: var(--dark);
    padding: 20px 32px;
    border-top: 5px solid var(--orange);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .logo-img { height: 52px; width: auto; display: block; }

  .doc-title {
    text-align: right;
    color: #ccc;
    font-size: 12px;
    line-height: 1.6;
  }
  .doc-title strong {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.2px;
  }

  /* META */
  .meta-bar {
    background: white;
    border: 1px solid var(--border);
    border-top: 3px solid var(--orange);
    padding: 20px 28px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 16px 24px;
    margin-bottom: 20px;
  }

  .meta-field label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #999;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 5px;
  }
  .meta-field input {
    width: 100%;
    border: none;
    border-bottom: 2px solid var(--border);
    padding: 5px 0;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    color: var(--dark);
    background: transparent;
    outline: none;
    transition: border-color 0.2s;
  }
  .meta-field input:focus { border-bottom-color: var(--orange); }

  /* TABLE */
  .checklist {
    width: 100%;
    background: white;
    border: 1px solid var(--border);
    border-collapse: collapse;
    margin-bottom: 20px;
    font-size: 13.5px;
  }
  .checklist thead tr { background: var(--dark); color: white; }
  .checklist thead th {
    padding: 11px 14px;
    text-align: left;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
  }
  .checklist thead th:nth-child(2) { width: 160px; text-align: center; }
  .checklist thead th:nth-child(3) { width: 210px; }
  .checklist tbody tr { border-bottom: 1px solid #efefef; transition: background 0.12s; }
  .checklist tbody tr:last-child { border-bottom: none; }
  .checklist tbody tr:hover { background: #fafafa; }
  .checklist tbody tr.has-nok { background: #fff6f6; }
  .checklist td { padding: 9px 14px; vertical-align: middle; }
  .item-name { font-size: 13px; color: var(--dark); line-height: 1.4; }

  /* CONDICION BUTTONS */
  .cond-group { display: flex; gap: 5px; justify-content: center; }
  .cond-btn { display: none; }
  .cond-label {
    display: inline-flex; align-items: center; justify-content: center;
    width: 42px; height: 27px; border-radius: 4px;
    font-size: 11px; font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer; border: 1.5px solid transparent;
    transition: all 0.15s; letter-spacing: 0.5px; user-select: none;
  }
  .cond-label.ok-label  { border-color: #bde0cb; color: var(--ok);  background: var(--ok-bg);  }
  .cond-label.nok-label { border-color: #f5c6c4; color: var(--nok); background: var(--nok-bg); }
  .cond-label.nc-label  { border-color: #cdd0d5; color: var(--nc);  background: var(--nc-bg);  }
  .cond-btn.ok-btn:checked  + .ok-label  { background: var(--ok);  color: white; border-color: var(--ok);  }
  .cond-btn.nok-btn:checked + .nok-label { background: var(--nok); color: white; border-color: var(--nok); }
  .cond-btn.nc-btn:checked  + .nc-label  { background: var(--nc);  color: white; border-color: var(--nc);  }

  .obs-input {
    width: 100%; border: none; border-bottom: 1.5px solid #e8e8e8;
    padding: 4px 0; font-family: 'IBM Plex Sans', sans-serif; font-size: 12.5px;
    color: var(--dark); background: transparent; outline: none; transition: border-color 0.2s;
  }
  .obs-input:focus { border-bottom-color: var(--orange); }

  /* OTROS */
  .otros-block {
    background: white; border: 1px solid var(--border);
    padding: 16px 20px; margin-bottom: 20px;
  }
  .otros-block label {
    display: block; font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; color: #999;
    font-family: 'IBM Plex Mono', monospace; margin-bottom: 10px;
  }
  .otros-block textarea {
    width: 100%; border: 1.5px solid #e8e8e8; padding: 10px 12px;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; color: var(--dark);
    background: #fafafa; outline: none; resize: vertical; min-height: 70px;
    border-radius: 4px; transition: border-color 0.2s;
  }
  .otros-block textarea:focus { border-color: var(--orange); }

  /* FIRMA */
  .firma-block {
    background: white; border: 1px solid var(--border);
    padding: 20px 28px; margin-bottom: 20px;
    display: flex; align-items: flex-start; gap: 32px;
  }
  .firma-line { flex: 1; }
  .firma-line.wide { flex: 2; }
  .firma-line label {
    display: block; font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; color: #999;
    font-family: 'IBM Plex Mono', monospace; margin-bottom: 6px;
  }
  .firma-line input {
    width: 100%; border: none; border-bottom: 2px solid var(--border);
    padding: 6px 0; font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; color: var(--dark); background: transparent;
    outline: none; transition: border-color 0.2s;
  }
  .firma-line input:focus { border-bottom-color: var(--orange); }

  /* REFS */
  .ref-block {
    background: var(--dark); color: white;
    padding: 14px 24px; margin-bottom: 28px;
    display: flex; gap: 28px; flex-wrap: wrap;
  }
  .ref-item { display: flex; align-items: flex-start; gap: 10px; }
  .ref-badge {
    font-family: 'IBM Plex Mono', monospace; font-weight: 700;
    font-size: 11px; padding: 3px 8px; border-radius: 3px;
    flex-shrink: 0; margin-top: 2px;
  }
  .ref-badge.ok  { background: var(--ok);  color: white; }
  .ref-badge.nok { background: var(--nok); color: white; }
  .ref-badge.nc  { background: var(--nc);  color: white; }
  .ref-text { font-size: 11.5px; color: #bbb; line-height: 1.5; }

  /* SUBMIT */
  .submit-area { display: flex; justify-content: flex-end; gap: 12px; }
  .btn-reset {
    padding: 11px 26px; border: 2px solid var(--border); background: white;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 600;
    color: #666; cursor: pointer; border-radius: 4px; transition: all 0.2s;
  }
  .btn-reset:hover { border-color: #999; color: var(--dark); }
  .btn-submit {
    padding: 11px 34px;
    background: linear-gradient(135deg, var(--orange), var(--red));
    color: white; border: none;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; border-radius: 4px; transition: opacity 0.2s; letter-spacing: 0.3px;
  }
  .btn-submit:hover:not(:disabled) { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    padding: 13px 26px; border-radius: 6px; font-size: 14px; font-weight: 600;
    font-family: 'IBM Plex Sans', sans-serif; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: #2a7d4f; color: white; }
  .toast.error   { background: #c0392b; color: white; }
  .toast.info    { background: var(--dark); color: white; }

  @media (max-width: 600px) {
    .meta-bar { grid-template-columns: 1fr 1fr; }
    .ref-block { flex-direction: column; gap: 14px; }
    .header { padding: 16px 20px; }
    .submit-area { flex-direction: column; }
    .btn-reset, .btn-submit { width: 100%; text-align: center; }
    .firma-block { flex-direction: column; gap: 20px; }
    .firma-line.wide { flex: 1; }
  }

  @media print {
    body { background: white; padding: 0; }
    .submit-area, .toast { display: none !important; }
    .container { max-width: 100%; }
  }
</style>
</head>

      <input id="meta_autoelevador" type="text" placeholder="Ej: AE-003">
    </div>
    <div class="meta-field">
      <label>Cant. de Hs.</label>
      <input id="meta_horas" type="text" placeholder="Ej: 1.250 hs">
    </div>
    <div class="meta-field">
      <label>Frecuencia</label>
      <input id="meta_frecuencia" type="text" placeholder="Ej: Mensual">
    </div>
    <div class="meta-field">
      <label>Fecha Insp.</label>
      <input id="meta_fecha" type="date">
    </div>
    <div class="meta-field" style="grid-column: span 2;">
      <label>Inspeccionó</label>
      <input id="meta_inspector" type="text" placeholder="Nombre completo">
    </div>
    <div class="meta-field" style="grid-column: span 2;">
      <label>Sector / Área</label>
      <input id="meta_sector" type="text" placeholder="Depósito, logística, etc.">
    </div>
  </div>

  <table class="checklist">
    <thead>
      <tr>
        <th>Elemento Evaluado</th>
        <th>Condición</th>
        <th>Observaciones / Acc. correctivas</th>
      </tr>
    </thead>
    <tbody id="checklist-body"></tbody>
  </table>

  <div class="otros-block">
    <label>Otros</label>
    <textarea id="otros" placeholder="Observaciones adicionales…"></textarea>
  </div>

  <div class="firma-block">
    <div class="firma-line wide">
      <label>Firma y Aclaración del Inspector</label>
      <input id="firma_aclaracion" type="text" placeholder="Nombre y apellido">
    </div>
    <div class="firma-line">
      <label>Fecha</label>
      <input id="firma_fecha" type="date">
    </div>
  </div>

  <div class="ref-block">
    <div class="ref-item">
      <span class="ref-badge ok">OK</span>
      <span class="ref-text">Condición estándar. Cumple con las condiciones de seguridad.</span>
    </div>
    <div class="ref-item">
      <span class="ref-badge nok">NOK</span>
      <span class="ref-text">Desviación. No cumple. Aclarar acciones correctivas.</span>
    </div>
    <div class="ref-item">
      <span class="ref-badge nc">NC</span>
      <span class="ref-text">No corresponde. El equipo no posee este ítem.</span>
    </div>
  </div>

  <div class="submit-area">
    <button class="btn-reset" onclick="resetForm()">Limpiar</button>
    <button class="btn-submit" id="btnSubmit" onclick="enviarFormulario()">Enviar a Google Sheets</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywsYLCVLQZco9WmZ8OC6nufmyE9WCoSwlTzm7MoPb6yW4k2BrkIPeZVVTVb-7mGeWWcA/exec";

const items = [
  "El conductor posee carnet",
  "Espejo retrovisor",
  "Estado del volante",
  "Bocina",
  "Estado del tablero",
  "Estado del asiento",
  "Cinturón de seguridad",
  "Estado de las pedaleras",
  "Estado de comandos",
  "Estado de la jaula",
  "Freno de mano y de pie",
  "Matafuegos",
  "Luces delanteras",
  "Luces traseras",
  "Luces de stop",
  "Alarma acústica / luz de retroceso",
  "Baliza superior",
  "Estado de la torre",
  "Estado de las uñas, fijación de las uñas/horquilla",
  "Estado de baterías y cables",
  "Estado de las cubiertas (banda de rodaje, presión, desgaste)",
  "Estado de frenos",
  "Sistema de dirección y transmisión",
  "Regulación del embrague",
  "Inexistencia de fugas de fluidos en el sistema hidráulico, mangueras, conexiones",
  "Pintura en general",
  "Combustión",
  "Engrase en general, niveles de aceite",
];

const tbody = document.getElementById('checklist-body');
items.forEach((item, i) => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="item-name">${item}</td>
    <td>
      <div class="cond-group">
        <input class="cond-btn ok-btn"  type="radio" name="cond_${i}" id="ok_${i}"  value="OK">
        <label class="cond-label ok-label"  for="ok_${i}">OK</label>
        <input class="cond-btn nok-btn" type="radio" name="cond_${i}" id="nok_${i}" value="NOK">
        <label class="cond-label nok-label" for="nok_${i}">NOK</label>
        <input class="cond-btn nc-btn"  type="radio" name="cond_${i}" id="nc_${i}"  value="NC">
        <label class="cond-label nc-label"  for="nc_${i}">NC</label>
      </div>
    </td>
    <td><input class="obs-input" type="text" data-index="${i}" placeholder="—"></td>
  `;
  tr.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener('change', () => tr.classList.toggle('has-nok', r.value === 'NOK' && r.checked));
  });
  tbody.appendChild(tr);
});

function recolectarDatos() {
  return {
    meta: {
      autoelevador: document.getElementById('meta_autoelevador').value,
      horas:        document.getElementById('meta_horas').value,
      frecuencia:   document.getElementById('meta_frecuencia').value,
      fecha:        document.getElementById('meta_fecha').value,
      inspector:    document.getElementById('meta_inspector').value,
      sector:       document.getElementById('meta_sector').value,
    },
    items: items.map((nombre, i) => ({
      nombre,
      condicion:   (document.querySelector(`input[name="cond_${i}"]:checked`) || {}).value || "",
      observacion: (document.querySelector(`.obs-input[data-index="${i}"]`) || {}).value || "",
    })),
    otros:           document.getElementById('otros').value,
    firma_aclaracion: document.getElementById('firma_aclaracion').value,
    firma_fecha:      document.getElementById('firma_fecha').value,
  };
}

async function enviarFormulario() {
  const data = recolectarDatos();
  if (!data.meta.autoelevador) { showToast('Completá el número de autoelevador', 'error'); return; }
  if (!data.meta.inspector)    { showToast('Completá el nombre del inspector', 'error'); return; }
  if (!data.meta.fecha)        { showToast('Completá la fecha de inspección', 'error'); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = 'Enviando…';

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    showToast('✅ Inspección guardada en Google Sheets', 'success');
    setTimeout(() => {
      if (confirm('¿Limpiar el formulario para una nueva inspección?')) resetForm();
    }, 1500);
  } catch (err) {
    showToast('❌ Error al enviar. Revisá la conexión.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enviar a Google Sheets';
  }
}

function resetForm() {
  document.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
  document.querySelectorAll('.obs-input').forEach(i => i.value = '');
  ['meta_autoelevador','meta_horas','meta_frecuencia','meta_fecha','meta_inspector','meta_sector','firma_aclaracion','firma_fecha']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('otros').value = '';
  document.querySelectorAll('tr.has-nok').forEach(tr => tr.classList.remove('has-nok'));
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
